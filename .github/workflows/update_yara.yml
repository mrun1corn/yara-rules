name: Update YARA Rules

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Sync Script
        run: python sync_yara_rules.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Organized_YARA/ seen_hashes.json yara_structure_mapping.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated YARA rules update" && git push)
